basePath: /api/v1
definitions:
  apperrors.InvalidParam:
    properties:
      field:
        type: string
      reason:
        type: string
    type: object
  dto.CategoryListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Category'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.ChangePasswordRequest:
    properties:
      newPassword:
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  dto.ChangeRoleRequest:
    properties:
      roleId:
        type: string
      userId:
        type: string
    required:
    - roleId
    - userId
    type: object
  dto.CreateCategoryRequest:
    properties:
      description:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      parentId:
        type: string
    required:
    - name
    type: object
  dto.CreateInventoryRequest:
    properties:
      locationCode:
        type: string
      maxQuantity:
        type: integer
      metadata:
        additionalProperties: {}
        type: object
      minQuantity:
        minimum: 0
        type: integer
      productId:
        type: string
      quantity:
        minimum: 0
        type: integer
      warehouseId:
        type: string
    required:
    - productId
    - warehouseId
    type: object
  dto.CreateProductRequest:
    properties:
      categoryId:
        type: string
      costPrice:
        minimum: 0
        type: number
      description:
        type: string
      images:
        items:
          type: string
        type: array
      metadata:
        additionalProperties: {}
        type: object
      name:
        maxLength: 200
        minLength: 2
        type: string
      price:
        minimum: 0
        type: number
      reorderLevel:
        minimum: 0
        type: integer
      reorderQuantity:
        minimum: 0
        type: integer
      sku:
        maxLength: 50
        minLength: 2
        type: string
      supplierId:
        type: string
      weightKg:
        minimum: 0
        type: number
    required:
    - name
    - price
    - sku
    type: object
  dto.CreateRoleRequest:
    properties:
      description:
        minLength: 3
        type: string
      name:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - description
    - name
    type: object
  dto.CreateSupplierRequest:
    properties:
      address:
        $ref: '#/definitions/dto.SupplierAddress'
      contactPerson:
        type: string
      description:
        type: string
      email:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      phone:
        type: string
      taxId:
        maxLength: 50
        minLength: 5
        type: string
    required:
    - address
    - name
    - taxId
    type: object
  dto.CreateWarehouseRequest:
    properties:
      address:
        $ref: '#/definitions/dto.WarehouseAddress'
      code:
        maxLength: 50
        minLength: 2
        type: string
      description:
        type: string
      email:
        type: string
      managerName:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      notes:
        type: string
      phone:
        type: string
    required:
    - address
    - code
    - name
    type: object
  dto.InventoryListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.InventoryResponse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.InventoryResponse:
    properties:
      availableQuantity:
        type: integer
      createdAt:
        type: string
      id:
        type: string
      lastCountedAt:
        type: string
      locationCode:
        type: string
      maxQuantity:
        type: integer
      metadata:
        $ref: '#/definitions/models.InventoryMetadata'
      minQuantity:
        type: integer
      product:
        $ref: '#/definitions/models.Product'
      productId:
        type: string
      quantity:
        type: integer
      reservedQuantity:
        type: integer
      updatedAt:
        type: string
      version:
        type: integer
      warehouse:
        $ref: '#/definitions/models.Warehouse'
      warehouseId:
        type: string
    type: object
  dto.ProductListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Product'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.RefreshTokenResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      password:
        minLength: 8
        type: string
      roleId:
        type: string
    required:
    - email
    - name
    - password
    - roleId
    type: object
  dto.SignInRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.SignInResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  dto.SignOutRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.StockOperationRequest:
    properties:
      quantity:
        type: integer
      reason:
        type: string
    required:
    - quantity
    type: object
  dto.SupplierAddress:
    properties:
      city:
        type: string
      complement:
        type: string
      country:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        minLength: 3
        type: string
      zipCode:
        type: string
    required:
    - city
    - country
    - number
    - state
    - street
    - zipCode
    type: object
  dto.SupplierListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Supplier'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.UpdateCategoryRequest:
    properties:
      description:
        type: string
      isActive:
        type: boolean
      name:
        maxLength: 100
        minLength: 3
        type: string
      parentId:
        type: string
    required:
    - isActive
    - name
    type: object
  dto.UpdateInventoryRequest:
    properties:
      locationCode:
        type: string
      maxQuantity:
        minimum: 0
        type: integer
      metadata:
        additionalProperties: {}
        type: object
      minQuantity:
        minimum: 0
        type: integer
      quantity:
        minimum: 0
        type: integer
      reservedQuantity:
        minimum: 0
        type: integer
    type: object
  dto.UpdateProductRequest:
    properties:
      categoryId:
        type: string
      costPrice:
        minimum: 0
        type: number
      description:
        type: string
      images:
        items:
          type: string
        type: array
      isActive:
        type: boolean
      metadata:
        additionalProperties: {}
        type: object
      name:
        maxLength: 200
        minLength: 2
        type: string
      price:
        minimum: 0
        type: number
      reorderLevel:
        minimum: 0
        type: integer
      reorderQuantity:
        minimum: 0
        type: integer
      sku:
        maxLength: 50
        minLength: 2
        type: string
      supplierId:
        type: string
      weightKg:
        minimum: 0
        type: number
    type: object
  dto.UpdateSupplierRequest:
    properties:
      address:
        $ref: '#/definitions/dto.SupplierAddress'
      contactPerson:
        type: string
      description:
        type: string
      email:
        type: string
      isActive:
        type: boolean
      name:
        maxLength: 100
        minLength: 3
        type: string
      phone:
        type: string
      taxId:
        maxLength: 50
        minLength: 5
        type: string
    required:
    - address
    - isActive
    - name
    - taxId
    type: object
  dto.UpdateWarehouseRequest:
    properties:
      address:
        $ref: '#/definitions/dto.WarehouseAddress'
      code:
        maxLength: 50
        minLength: 2
        type: string
      description:
        type: string
      email:
        type: string
      isActive:
        type: boolean
      managerName:
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      notes:
        type: string
      phone:
        type: string
    required:
    - address
    - code
    - isActive
    - name
    type: object
  dto.UserListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.User'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.WarehouseAddress:
    properties:
      city:
        type: string
      complement:
        type: string
      country:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        minLength: 3
        type: string
      zipCode:
        type: string
    required:
    - city
    - country
    - number
    - state
    - street
    - zipCode
    type: object
  dto.WarehouseListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Warehouse'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  handlers.ProblemDetails:
    properties:
      detail:
        type: string
      invalid_params:
        items:
          $ref: '#/definitions/apperrors.InvalidParam'
        type: array
      title:
        type: string
      trace_id:
        type: string
      type:
        type: string
    type: object
  models.Address:
    properties:
      city:
        type: string
      complement:
        type: string
      country:
        type: string
      number:
        type: string
      state:
        type: string
      street:
        type: string
      zip_code:
        type: string
    type: object
  models.Category:
    properties:
      created_at:
        description: CreatedAt is the timestamp when the category was persistent.
        type: string
      description:
        description: Description provides additional context about the category.
        type: string
      id:
        description: ID is the unique identifier for the category.
        type: string
      is_active:
        description: IsActive determines if the category is visible in the frontend.
        type: boolean
      name:
        description: Name is the display name of the category (e.g., "Electronics").
        type: string
      parent_id:
        description: ParentID links to the parent category for hierarchical grouping.
        type: string
      slug:
        description: Slug is the URL-friendly name used for queries (e.g., "electronics").
        type: string
      updated_at:
        description: UpdatedAt is the timestamp for the last update to the category
          record.
        type: string
    type: object
  models.Inventory:
    properties:
      createdAt:
        type: string
      id:
        type: string
      lastCountedAt:
        type: string
      locationCode:
        type: string
      maxQuantity:
        type: integer
      metadata:
        $ref: '#/definitions/models.InventoryMetadata'
      minQuantity:
        type: integer
      product:
        allOf:
        - $ref: '#/definitions/models.Product'
        description: Relationships
      productId:
        type: string
      quantity:
        type: integer
      reservedQuantity:
        type: integer
      updatedAt:
        type: string
      version:
        type: integer
      warehouse:
        $ref: '#/definitions/models.Warehouse'
      warehouseId:
        type: string
    type: object
  models.InventoryMetadata:
    additionalProperties: {}
    type: object
  models.Product:
    properties:
      category:
        allOf:
        - $ref: '#/definitions/models.Category'
        description: Relationships
      categoryId:
        type: string
      costPrice:
        type: number
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      images:
        items:
          type: string
        type: array
      isActive:
        type: boolean
      metadata:
        $ref: '#/definitions/models.ProductMetadata'
      name:
        type: string
      price:
        type: number
      reorderLevel:
        type: integer
      reorderQuantity:
        type: integer
      sku:
        type: string
      slug:
        type: string
      supplier:
        $ref: '#/definitions/models.Supplier'
      supplierId:
        type: string
      updatedAt:
        type: string
      weightKg:
        type: number
    type: object
  models.ProductMetadata:
    additionalProperties: {}
    type: object
  models.Role:
    properties:
      created_at:
        description: CreatedAt is the timestamp when the role was created.
        type: string
      description:
        description: Description is a brief description of the role's purpose.
        type: string
      id:
        description: ID is the unique identifier for the role.
        type: string
      name:
        description: Name is the name of the role across the system.
        type: string
    type: object
  models.Supplier:
    properties:
      address:
        allOf:
        - $ref: '#/definitions/models.Address'
        description: Address is a flexible JSONB field containing location details.
      contact_person:
        description: ContactPerson is the name of the primary representative at the
          supplier.
        type: string
      created_at:
        description: CreatedAt is the timestamp when the supplier was registered.
        type: string
      description:
        description: Description provides additional context about the supplier.
        type: string
      email:
        description: Email is the main contact email for the supplier.
        type: string
      id:
        description: ID is the unique identifier for the supplier.
        type: string
      is_active:
        description: IsActive determines if the supplier is currently enabled for
          operations.
        type: boolean
      name:
        description: Name is the display name of the supplier.
        type: string
      phone:
        description: Phone is the primary contact phone number.
        type: string
      slug:
        description: Slug is the URL-friendly name used for queries.
        type: string
      tax_id:
        description: TaxID is the fiscal identification (e.g., CNPJ, CPF, EIN).
        type: string
      updated_at:
        description: UpdatedAt is the timestamp for the last update to the supplier
          record.
        type: string
    type: object
  models.User:
    properties:
      created_at:
        description: CreatedAt is the timestamp when the user account was created.
        type: string
      email:
        description: Email is the unique email address of the user.
        type: string
      id:
        description: ID is the unique identifier for the user.
        type: string
      name:
        description: Name is the full name of the user.
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.Role'
        description: Role is the hydrated role model representing the user's permissions.
      role_id:
        description: RoleID is the foreign key linking the user to a role.
        type: string
      updated_at:
        description: UpdatedAt is the timestamp for the last update to the user profile.
        type: string
    type: object
  models.Warehouse:
    properties:
      address:
        allOf:
        - $ref: '#/definitions/models.Address'
        description: |-
          Address is a flexible JSONB field containing location details.
          Reuses the Address struct defined in supplier.go
      code:
        description: Code is the internal reference code for the warehouse (e.g.,
          'WH01', 'SP01').
        type: string
      created_at:
        description: CreatedAt is the timestamp when the warehouse was registered.
        type: string
      description:
        description: Description provides additional context about the warehouse.
        type: string
      email:
        description: Email is the contact email for the warehouse.
        type: string
      id:
        description: ID is the unique identifier for the warehouse.
        type: string
      is_active:
        description: IsActive determines if the warehouse is currently enabled for
          operations.
        type: boolean
      manager_name:
        description: ManagerName is the name of the person responsible for the warehouse.
        type: string
      name:
        description: Name is the display name of the warehouse.
        type: string
      notes:
        description: Notes contains any extra information about the warehouse.
        type: string
      phone:
        description: Phone is the contact phone number for the warehouse.
        type: string
      slug:
        description: Slug is the URL-friendly name used for queries.
        type: string
      updated_at:
        description: UpdatedAt is the timestamp for the last update to the warehouse
          record.
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Jandir A. Cutabiala
    url: https://github.com/jandiralceu/inventory_api_with_golang
  description: REST API for an Inventory Management System built with Go and Gin.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Inventory API
  version: "1.0"
paths:
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates the session by issuing a new access and refresh token pair
        using a valid refresh token.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New tokens generated successfully
          schema:
            $ref: '#/definitions/dto.RefreshTokenResponse'
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Invalid, expired or already used refresh token
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Refresh session
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with name, email, password and assigned
        role.
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "204":
          description: User registered successfully
        "400":
          description: Invalid input or validation error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "409":
          description: Email already in use
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Register a new user
      tags:
      - auth
  /auth/signin:
    post:
      consumes:
      - application/json
      description: Logs in a user with email and password, returning access and refresh
        tokens.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens generated successfully
          schema:
            $ref: '#/definitions/dto.SignInResponse'
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Authenticate user
      tags:
      - auth
  /auth/signout:
    post:
      consumes:
      - application/json
      description: Invalidates the session by deleting the refresh token from the
        server-side cache.
      parameters:
      - description: Token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SignOutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Successfully logged out
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: User logout
      tags:
      - auth
  /categories:
    get:
      description: Retrieve a paginated list of categories with optional filters.
      parameters:
      - description: Filter by name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by exact slug
        in: query
        name: slug
        type: string
      - description: Filter by parent category ID
        in: query
        name: parentId
        type: string
      - description: Filter by active status
        in: query
        name: isActive
        type: boolean
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Sort field
        in: query
        name: sort
        type: string
      - description: Sort order (asc/desc)
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CategoryListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      security:
      - Bearer: []
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Register a new product category in the system.
      parameters:
      - description: Category data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      security:
      - Bearer: []
      summary: Create a category
      tags:
      - categories
  /categories/{id}:
    delete:
      description: Remove a category from the system by its ID.
      parameters:
      - description: Category ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      security:
      - Bearer: []
      summary: Delete a category
      tags:
      - categories
    get:
      description: Retrieve a single category by its unique ID.
      parameters:
      - description: Category ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Category'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "404":
