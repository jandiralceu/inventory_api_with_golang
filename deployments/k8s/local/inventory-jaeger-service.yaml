apiVersion: v1
kind: Service
metadata:
  name: inventory-jaeger
  namespace: inventory
  labels:
    app: inventory-jaeger
spec:
  selector:
    app: inventory-jaeger
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: ui
      protocol: TCP
      port: 16686
      targetPort: 16686
  type: ClusterIP
