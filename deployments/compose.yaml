name: inventory
services:
  db:
    container_name: inventory-postgres
    image: postgres:17.0
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: jandiralceu
      POSTGRES_PASSWORD: nk6eloPZ1FQk8Ku1
      POSTGRES_DB: inventory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jandiralceu -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory-network

  jaeger:
    container_name: inventory-jaeger
    image: jaegertracing/jaeger:2.5.0
    restart: always
    ports:
      - 4317:4317   # OTLP gRPC (receives traces from the app)
      - 16686:16686 # Web UI (http://localhost:16686)
    environment:
      SPAN_STORAGE_TYPE: "memory"
    networks:
      - inventory-network

  redis:
    container_name: inventory-redis
    image: redis:7-alpine
    restart: always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory-network

  migrate:
    container_name: inventory-migrate
    image: migrate/migrate
    volumes:
      - ../migrations:/migrations
    networks:
      - inventory-network
    depends_on:
      db:
        condition: service_healthy
    command:
      - -path=/migrations/
      - -database=postgres://jandiralceu:nk6eloPZ1FQk8Ku1@db:5432/inventory?sslmode=disable
      - up

  api:
    container_name: inventory-api
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    profiles:
      - "all"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_USER=jandiralceu
      - DB_PASSWORD=nk6eloPZ1FQk8Ku1
      - DB_NAME=inventory
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ../private.pem:/app/private.pem:ro
      - ../public.pem:/app/public.pem:ro
      - ../model.conf:/app/model.conf:ro
      - ../policy.csv:/app/policy.csv:ro
    networks:
      - inventory-network

networks:
  inventory-network:
    driver: bridge
